<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rdw-GPT - Gus Pinter Tenant 🤖</title>
        <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f6821f'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='38' font-family='sans-serif'%3E🤖%3C/text%3E%3C/svg%3E">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
        <style>
            :root {
                --primary-color: #f6821f;
                --primary-hover: #e67e22;
                --light-bg: #f9fafb;
                --border-color: #e5e7eb;
                --text-color: #1f2937;
                --text-light: #6b7280;
                --user-msg-bg: #fff2e6;
                --assistant-msg-bg: #f3f4f6;
                /* Tambahan variabel dari kode aslimu untuk badge */
                --primary: #f6821f;
                --primary-2: #ff9f43;
                --dark: #1f2937;
                --text-soft: #6b7280;
                --green: #2eb85c;
                --border: #e5e7eb;
                --primary-3: #fcd34d;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
                    Cantarell, sans-serif;
                line-height: 1.6;
                color: var(--text-color);
                max-width: 800px;
                margin: 0 auto;
                padding: 1rem;
            }

            /* ── HEADER ── */
            header {
                text-align: center;
                padding: 1.5rem 0 1.2rem;
                position: relative;
            }

            .header-badge {
                display: inline-block;
                background: linear-gradient(135deg, var(--primary), var(--primary-2));
                color: white;
                font-size: 0.7rem;
                font-weight: 800;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                padding: 3px 10px;
                border-radius: 20px;
                margin-bottom: 0.5rem;
                box-shadow: 0 2px 8px rgba(246,130,31,0.35);
            }

            h1 {
                font-family: 'Syne', sans-serif;
                font-size: 2rem;
                font-weight: 800;
                color: var(--primary);
                line-height: 1.1;
                letter-spacing: -0.02em;
            }

            h1 span {
                color: var(--dark);
                font-size: 1rem;
                font-weight: 700;
                font-family: 'Nunito', sans-serif;
                display: block;
                margin-top: 2px;
                letter-spacing: 0;
            }

            .header-sub {
                margin-top: 0.4rem;
                font-size: 0.82rem;
                color: var(--text-soft);
                font-weight: 600;
            }

            .status-dot {
                display: inline-block;
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--green);
                margin-right: 5px;
                animation: pulse 2s infinite;
                vertical-align: middle;
            }

            @keyframes pulse {
                0%, 100% { box-shadow: 0 0 0 0 rgba(46,184,92,0.5); }
                50%       { box-shadow: 0 0 0 5px rgba(46,184,92,0); }
            }

            .chat-container {
                display: flex;
                flex-direction: column;
                height: calc(100vh - 200px);
                min-height: 400px;
                border: 1px solid var(--border-color);
                border-radius: 8px;
                overflow: hidden;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }

            .chat-messages {
                flex: 1;
                overflow-y: auto;
                padding: 1rem;
                background-color: var(--light-bg);
            }

            .message {
                margin-bottom: 1rem;
                padding: 0.75rem;
                border-radius: 8px;
                max-width: 80%;
            }

            .message p {
                white-space: pre-line;
                margin: 0;
                overflow-wrap: anywhere;
            }

            .user-message {
                background-color: var(--user-msg-bg);
                align-self: flex-end;
                margin-left: auto;
                border-bottom-right-radius: 0;
            }

            .assistant-message {
                background-color: var(--assistant-msg-bg);
                align-self: flex-start;
                border-bottom-left-radius: 0;
            }

            .message-input {
                display: flex;
                padding: 0.75rem;
                border-top: 1px solid var(--border-color);
                background-color: white;
            }

            #user-input {
                flex: 1;
                padding: 0.75rem;
                border: 1px solid var(--border-color);
                border-radius: 8px;
                font-family: inherit;
                resize: none;
                min-height: 44px;
            }

            #user-input:focus {
                outline: none;
                border-color: var(--primary-color);
                box-shadow: 0 0 0 2px rgba(246, 130, 31, 0.2);
            }

            #send-button {
                margin-left: 0.5rem;
                padding: 0 1.2rem;
                background-color: var(--primary-color);
                color: white;
                border: none;
                border-radius: 8px;
                font-weight: 600;
                cursor: pointer;
                transition: background-color 0.2s;
            }

            #send-button:hover {
                background-color: var(--primary-hover);
            }

            #send-button:disabled {
                background-color: var(--text-light);
                cursor: not-allowed;
            }

            .typing-indicator {
                display: none;
                font-style: italic;
                color: var(--text-light);
                padding: 0.5rem 1rem 1rem;
                font-size: 0.9rem;
            }

            .typing-indicator.visible {
                display: block;
            }

            footer {
                margin-top: 1.5rem;
                text-align: center;
                font-size: 0.85rem;
                color: var(--text-light);
            }
        </style>
    </head>
    <body>
        <header>
                <div class="header-badge">🤖 AI Assistant</div>
                <h1>
                    Rdw-GPT
                    <span><i>(Gus Pinter Tenant)</i></span>
                </h1>
                <p class="header-sub">
                    <span class="status-dot"></span>
                    Online
                </p>
            </header>

        <div class="chat-container">
            <div id="chat-messages" class="chat-messages">
                <div class="message assistant-message">
                    <p>Halooo lur! 👋 <br>
					Inyong Rdw-GPT, asisten AI buatan kang mas Ridwan sing pinter (lumayan, hehe).

					Arep takon opo? Tulis bae, ojo isin-isin! 😄🔥</p>
                </div>
            </div>

            <div class="typing-indicator" id="typing-indicator">
                Sek, inyong lagi mikir keras kieh...
            </div>

            <div class="message-input">
                <textarea
                    id="user-input"
                    placeholder="Ngomong apa bae, Kang... inyong siyap! 🙂"
                    rows="1"
                    autofocus
                ></textarea>
                <button id="send-button">Gas!</button>
            </div>
        </div>

       <footer>
				<p>Rdw-GPT &copy; 2026 &mdash; digawe karo ❤️ <br> nganggo <a href="https://www.cloudflare.com/developer-platform/products/workers-ai/" target="_blank">Cloudflare Workers AI</a></p>
		</footer>

        <script src="chat.js"></script>
    </body>
</html>
